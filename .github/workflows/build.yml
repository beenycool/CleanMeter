name: Tauri Windows Build

on:
  workflow_dispatch:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: windows-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Rust Cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install npm dependencies
        run: npm ci

      - name: Build C# HardwareMonitor Sidecar
        run: |
          dotnet publish HardwareMonitor/HardwareMonitor/HardwareMonitor.csproj -c Release -r win-x64 --self-contained true -p:PublishSingleFile=true -p:PublishReadyToRun=true

      - name: Stage Sidecar Binaries
        shell: bash
        run: |
          mkdir -p src-tauri/binaries
          cp HardwareMonitor/HardwareMonitor/bin/Release/net8.0/win-x64/publish/HardwareMonitor.exe src-tauri/binaries/HardwareMonitor-x86_64-pc-windows-msvc.exe
          cp HardwareMonitor/HardwareMonitor/bin/Release/net8.0/win-x64/publish/HardwareMonitor.exe src-tauri/binaries/HardwareMonitor-x86_64-pc-windows-gnu.exe

      - name: Build Frontend and Tauri Application
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: v__VERSION__
          releaseName: 'CleanMeter v__VERSION__'
          releaseBody: 'Automated release of CleanMeter.'
          releaseDraft: true
          prerelease: false

      - name: Upload Installer Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: CleanMeter-Windows-Installer
          path: |
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/nsis/*.exe
